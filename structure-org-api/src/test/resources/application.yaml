server:
  port: 8080
spring:
  profiles:
    active: dev
  application:
    name: org-server
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER:nacos.structured.cn:8848}
      discovery:
        namespace: ${NACOS_NAMESPACE:5a4e4c1f-beda-4ae5-a3d7-428950e7473b}
        group: ${NACOC_GROUP:${spring.profiles.active}}
        enabled: ${NACOS_DISCOVERY_ENABLE:false}
        username: ${NACOS_USERNAME:structure}
        password: ${NACOS_PASSWORD:structure}
      config:
        server-addr: ${NACOS_SERVER:nacos.structured.cn:8848}
        namespace: ${NACOS_NAMESPACE:5a4e4c1f-beda-4ae5-a3d7-428950e7473b}
        group: ${NACOC_GROUP:${spring.profiles.active}}
        name: ${spring.application.name}
        file-extension: yaml
        enabled: ${NACOS_CONFIG_ENABLE:false}
        username: ${NACOS_USERNAME:structure}
        password: ${NACOS_PASSWORD:structure}

  main:
    allow-bean-definition-overriding: true
  datasource:
    username: root
    password: 123456
    url: jdbc:mysql://172.24.20.15:3306/org?useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      database: 1
      password: 123456
      host: 172.24.20.15
  rabbitmq:
    host: 172.24.20.15
    port: 5672
    username: root
    password: 123456
    virtual-host: /
    publisher-confirm-type: correlated # 开启confirmCallback
    publisher-returns: true
    listener:
      simple:
        concurrency: 1
        max-concurrency: 1
        prefetch: 50
        retry:
          enabled: true    # 开启消费重试机制
          max-attempts: 3  # 最大重试机制，默认为3
          initial-interval: 1000  # 重试间隔,单位毫秒,默认1000
        acknowledge-mode: manual
  flyway:
    enabled: true # 开启flyway
    clean-disabled: true # 禁止清理数据表
    table: flyway_schema_history # 版本控制信息表名，默认为flyway_schema_history
    out-of-order: false # 是否允许不按顺序迁移
    baseline-on-migrate: true # 如果数据库不是空表，需要设置为true，否则启动报错
    baseline-version: 1 # 和baseline-on-migrate搭配使用，小于此版本的不执行
    # schemas: 不设置使用默认Spring连接数据的地址和数据库
    validate-on-migrate: true # 执行迁移时是否自动调用验证
    locations: classpath:db/migration
  # 配置数据库，flyway那边就无需再进行数据的配置了
logging:
  level:
    org.springframework.security: DEBUG
structure:
  data-scope:
    enabled: true
    enable-tenant: true  # 启用租户拦截器
    enable-pagination: true  # 启用分页拦截器
    enable-data-scope: true  # 启用数据权限
    enable-multi-table: true  # 启用多表查询支持
    auto-register-rules: true
    auto-filter-response: true
    scan-packages:
      - cn.structured.datascope.example.mybatisplus.dto
    field-config:
      #      org-id-field: org_id
      dept-id-field: dept_id
    tenant-id-column: org_id
    default-tenant-id: 10
  oauth:
    resource:
      resource-id: user
      antMatchers:
        unAuthenticated:
          # 不经过身份验证的接口
          - /**
